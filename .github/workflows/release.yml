name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-nuget:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: |
          dotnet restore src/WpfToolsMcp.Tool/WpfToolsMcp.Tool.csproj
          dotnet restore tests/WpfToolsMcp.SnapshotTests/WpfToolsMcp.SnapshotTests.csproj

      - name: Build Snoop payloads (Release)
        run: pwsh scripts/build-snoop.ps1 -Configuration Release

      - name: Build
        run: dotnet build src/WpfToolsMcp.Tool/WpfToolsMcp.Tool.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/WpfToolsMcp.SnapshotTests/WpfToolsMcp.SnapshotTests.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/WpfToolsMcp.Tool/WpfToolsMcp.Tool.csproj -c Release --no-build -o artifacts

      - name: NuGet login (Trusted Publishing / OIDC)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path "artifacts" -Filter "*.nupkg" -File -ErrorAction SilentlyContinue
          if (-not $packages) {
            throw "No .nupkg files found under 'artifacts'."
          }

          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
          }
